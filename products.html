<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Products</title>

<link rel="stylesheet"
href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="main-content">

<div class="dashboard">

<h1>Product Management</h1>

<div class="panel">

<h3>Add Product</h3>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="text"
id="size"
placeholder="Size">

<input
type="text"
id="color"
placeholder="Color">

<input
type="number"
id="price"
placeholder="Price">

<input
type="number"
id="stock"
placeholder="Stock">

<input
type="file"
id="image">

<button
type="submit"
class="btn btn-primary">

Add Product

</button>

</form>

</div>

<br>

<div class="panel">

<input
type="text"
id="searchInput"
placeholder="Search Product">

<br><br>

<table>

<thead>

<tr>

<th>Image</th>
<th>Name</th>
<th>Category</th>
<th>Size</th>
<th>Price</th>
<th>Stock</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/products.js"></script>

</body>

</html>
