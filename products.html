<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Products - Aafiya Fashion Store</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">

<div class="logo-area">
<h2>
<i class="fas fa-shirt"></i>
Aafiya Fashion
</h2>
</div>

<ul>

<li>
<a href="dashboard.html">
<i class="fas fa-chart-line"></i>
Dashboard
</a>
</li>

<li class="active">
<a href="products.html">
<i class="fas fa-box"></i>
Products
</a>
</li>

<li>
<a href="sales.html">
<i class="fas fa-cart-shopping"></i>
Sales
</a>
</li>

<li>
<a href="reports.html">
<i class="fas fa-chart-pie"></i>
Reports
</a>
</li>

<li>
<a href="#" onclick="logout()">
<i class="fas fa-right-from-bracket"></i>
Logout
</a>
</li>

</ul>

</div>

<!-- Main Content -->
<div class="main-content">

<!-- Topbar -->
<header class="topbar">

<button id="menuBtn">
<i class="fas fa-bars"></i>
</button>

<div class="top-actions">

<button onclick="toggleDarkMode()" class="dark-btn">
<i class="fas fa-moon"></i>
</button>

</div>

</header>

<!-- Dashboard Area -->
<div class="dashboard">

<h1>Product Management</h1>

<!-- Add Product -->
<div class="panel">

<h3>Add Product</h3>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="text"
id="size"
placeholder="Size">

<input
type="text"
id="color"
placeholder="Color">

<input
type="number"
id="price"
placeholder="Price">

<input
type="number"
id="stock"
placeholder="Stock">

<input
type="file"
id="image">

<br><br>

<button
type="submit"
class="btn btn-primary">

Add Product

</button>

</form>

</div>

<br>

<!-- Product Table -->
<div class="panel">

<h3>Products List</h3>

<input
type="text"
id="searchInput"
placeholder="Search Product">

<br><br>

<table>

<thead>

<tr>
<th>Image</th>
<th>Name</th>
<th>Category</th>
<th>Size</th>
<th>Price</th>
<th>Stock</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="productTable">

</tbody>

</table>

</div>

</div>

</div>

<!-- Scripts -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/supabase.js"></script>

<script src="js/products.js"></script>

<script src="js/auth.js"></script>

<script src="js/dashboard.js"></script>

</body>
</html>
